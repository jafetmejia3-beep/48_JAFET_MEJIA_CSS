<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rubik Espacial</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  overflow:hidden;
}

body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(1px 1px at 70% 60%, white, transparent),
    radial-gradient(1.5px 1.5px at 40% 80%, white, transparent),
    radial-gradient(1px 1px at 90% 20%, white, transparent);
  animation: estrellas 40s linear infinite;
  opacity:0.8;
}

@keyframes estrellas{
  from{ transform:translateY(0); }
  to{ transform:translateY(200px); }
}

.escena{
  width:180px;
  height:180px;
  perspective:700px;
}

.cubo{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  animation:spin 8s infinite linear;
}

.face{
  position:absolute;
  width:180px;
  height:180px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.face div{
  border:1px solid #000;
}

.front div{ background:#ff3b3b; }
.back div{ background:#ff8c00; }
.right div{ background:#00c853; }
.left div{ background:#2979ff; }
.top div{ background:#ffd600; }
.bottom div{ background:#f5f5f5; }

.front  { transform: rotateY(0deg) translateZ(90px); }
.back   { transform: rotateY(180deg) translateZ(90px); }
.right  { transform: rotateY(90deg) translateZ(90px); }
.left   { transform: rotateY(-90deg) translateZ(90px); }
.top    { transform: rotateX(90deg) translateZ(90px); }
.bottom { transform: rotateX(-90deg) translateZ(90px); }

@keyframes spin{
  0%   { transform: rotateX(0) rotateY(0) rotateZ(0); }
  25%  { transform: rotateX(90deg) rotateY(180deg); }
  50%  { transform: rotateX(180deg) rotateY(270deg); }
  75%  { transform: rotateX(270deg) rotateY(360deg); }
  100% { transform: rotateX(360deg) rotateY(360deg); }
}
</style>
</head>

<body>

<div class="escena">
  <div class="cubo">

    <div class="face front">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>

    <div class="face back">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>

    <div class="face right">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>

    <div class="face left">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>

    <div class="face top">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>

    <div class="face bottom">
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
      <div></div><div></div><div></div>
    </div>

  </div>
</div>

</body>
</html>
